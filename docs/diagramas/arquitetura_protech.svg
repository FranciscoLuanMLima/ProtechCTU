<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <style>
    .bg{fill:#f7f9fc}.title{font:700 26px Arial;fill:#071d38}.h{font:700 18px Arial;fill:#071d38}.t{font:14px Arial;fill:#172033}
    .box{fill:#fff;stroke:#1e88e5;stroke-width:2;rx:12}.core{fill:#e8f3ff;stroke:#071d38;stroke-width:2;rx:12}
    .arrow{stroke:#071d38;stroke-width:2;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#071d38"/></marker></defs>
