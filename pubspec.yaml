name: protechctu
description: ProTech Flutter app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  go_router: ^15.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^3.3.1
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  uuid: ^4.5.2
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  isar_community_generator: ^3.3.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo_uespi.png
  remove_alpha_ios: true
  adaptive_icon_background: "#071D38"
  adaptive_icon_foreground: assets/logo_uespi.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/logo_uespi.png
